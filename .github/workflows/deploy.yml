name: deploy

on:
  workflow_run:
    workflows: ["test"]
    types:
      - completed

env:
  AWS_REGION: eu-central-1
  TF_VERSION: 1.5.0
  PROJECT_NAME: nginx-ecs-demo-4

jobs:
  build-and-deploy:
    name: 'Build and deploy'
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
      
    # Nastavení permissions pro OIDC
    permissions:
      contents: read
      id-token: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Generate image tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform init
      working-directory: ./terraform
      run: terraform init
    
    - name: Terraform Format Check
      id: fmt
      run: terraform fmt -check
      working-directory: ./terraform
      continue-on-error: true
    
    - name: Terraform Validate
      id: validate
      working-directory: ./terraform
      run: terraform validate -no-color

    ##### create ECR, build and push image
    - name: Terraform create ECR
      env:
          TF_VAR_image_version: ${{ env.IMAGE_TAG }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
      working-directory: ./terraform
      run: |
        echo "🚀 Creating ECR..."
        terraform init
        terraform plan -no-color -target=aws_ecr_repository.mynginx -out=tfplan
        terraform apply -auto-approve -no-color tfplan

    - name: Get ECR repository URL
      id: ECR_URL
      working-directory: ./terraform
      run: |
        ECR_URL=$(terraform output -raw ecr_repo_url)
        echo "✅ Done, repository URL: $ECR_URL"
        echo "ECR_URL=$ECR_URL" >> $GITHUB_OUTPUT

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2    

    - name: Build and push Docker image to ECR
      working-directory: ./app
      env:
        ECR_URL: ${{ steps.ECR_URL.outputs.ECR_URL }}
      run: |
        docker build --pull -t $ECR_URL:$IMAGE_TAG .

        echo "🚀 Pushing images to ECR..."
        docker push $ECR_URL:$IMAGE_TAG

        echo "✅ Images pushed successfully!"
    ############

    - name: Terraform exec whole IAC
      env:
          TF_VAR_image_version: ${{ env.IMAGE_TAG }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
      working-directory: ./terraform
      run: |
        echo "🚀 Creating ECS..."
        terraform init
        terraform plan -no-color -out=tfplan
        terraform apply -auto-approve -no-color tfplan
    
    - name: Get Load Balancer URL
      id: lb_url
      working-directory: ./terraform
      run: |
        LB_URL=$(terraform output -raw load_balancer_url)
        echo "url=$LB_URL" >> $GITHUB_OUTPUT
        echo "✅ Done"
        echo "Load Balancer URL: $LB_URL"
    
    - name: Test Application reaponds
      run: |
        echo "Waiting for ECS service to be stable... Can lasts several minutes."
        aws ecs wait services-stable \
        --cluster ${{ env.PROJECT_NAME }}-cluster \
        --services ${{ env.PROJECT_NAME }}-service
        
        echo "Testing application availability..."
        for i in {1..10}; do
          if curl -f "${{ steps.lb_url.outputs.url }}"; then
            echo "Application is responding!"
            break
          else
            echo "Attempt $i failed, retrying in 30 seconds..."
            sleep 30
          fi
        done

    - name: Test Application content
      working-directory: ./test
      run: |
        echo "Testing application content..."
        docker build --pull -t jester:latest .
        docker run --rm --env APPURL=${{ steps.lb_url.outputs.url }} jester:latest
