name: test

on:
  push:
    branches:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: build app
        working-directory: ./app
        run: docker build --pull -t mynginx:latest .
      - name: build test
        working-directory: ./test
        run: docker build --pull -t jester:latest .
      - name: compose and run tests
        run: |
          docker compose up \
          --abort-on-container-exit \
          --exit-code-from test
          docker compose down